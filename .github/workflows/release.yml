name: Release

on:
  push:
    branches: [main]

# changesets/action needs to push the "Version Packages" PR + tags.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: version / publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for changelog generation

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Rust + every cross-compile target (cargo-zigbuild uses zig as the linker,
      # so all platforms build from this single Linux runner — no native matrix).
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-pc-windows-gnu

      - uses: mlugg/setup-zig@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      # sccache caches Rust compilation across runs (GitHub Actions cache backend).
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Enable sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Auth for `bun publish` (token-based; bun reads ~/.npmrc).
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # When changesets exist → opens/updates the "Version Packages" PR (runs
      # `ci:version`). When that PR is merged (versions bumped, no changesets left)
      # → runs `ci:publish`: cross-compile natives, build packages, `bun publish`
      # each, then tag.
      - name: Changesets — version PR or publish
        uses: changesets/action@v1
        with:
          version: bun run ci:version
          publish: bun run ci:publish
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
