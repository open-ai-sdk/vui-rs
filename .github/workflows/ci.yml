name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (oxlint)
        run: bun run lint

      - name: Format check (oxfmt)
        run: bun run fmt:check

  test:
    name: test (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native engine (host)
        run: bun run build:native

      - name: Test (cargo + bun + ABI probe)
        run: bun run test

      - name: Build packages (tsdown)
        run: bun run build:packages

      - name: Typecheck
        run: |
          bunx tsc --noEmit -p tsconfig.json
          bun run typecheck:sfc
